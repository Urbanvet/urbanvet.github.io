<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanVet</title>
  <script>
    (function () {
      var routeParam = 'route';
      var knownRoutes = {
        '/mobile_tierarztpraxis_berlin': true,
        '/mobile_vet_berlin': true
      };
      var normalizedPath = window.location.pathname.replace(/\/+$/, '') || '/';

      if (!knownRoutes[normalizedPath]) {
        return;
      }

      var target = new URL(window.location.origin + '/');
      target.searchParams.set(routeParam, normalizedPath);
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
